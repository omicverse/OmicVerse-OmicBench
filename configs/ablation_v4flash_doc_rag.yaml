run_name: ablation_v4flash_doc_rag
description: |
  Mirror of ablation_gpt_doc_rag but on DeepSeek-v4-flash.
  The cross-model ablation matters because doc_rag ≈ baseline on
  v4-flash too implies the gap between OmicVerse and embedding RAG is
  a property of the OmicVerse contract, not the LLM.

  Build the index first:
    bash scripts/build_doc_rag_index.py

llm:
  model: deepseek-v4-flash
  endpoint: https://api.deepseek.com/v1
  api_key_env: DEEPSEEK_API_KEY
  temperature: 0.0

agent:
  max_agent_turns: 30

scope:
  systems: [deepseek_omicverse_doc_rag]
  task_ids: []
  layers: [A, B, C, E, F, G, L]
  difficulties: []
  seeds: [0]
  skip_completed: true

paths:
  trajectories_dir: trajectories
  results_dir: results
  workspace_dir: data/workspace
  logs_dir: logs
