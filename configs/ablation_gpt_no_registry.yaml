run_name: ablation_gpt_no_registry
description: |
  Ablation: Beacon prompt minus the registry/skill discovery section.
  Tests whether function discovery (registry_lookup + skill_lookup)
  is the load-bearing component of Beacon, or whether the static
  domain prompt alone explains the gain.

llm:
  model: gpt-5.5
  endpoint: "(unused — gpt_oauth resolves via ~/.codex/auth.json)"
  api_key_env: ""
  temperature: 0.0

agent:
  max_agent_turns: 35

scope:
  systems: [gpt_omicverse_no_registry]
  task_ids: []
  layers: [A, B, C, E, F, G, L]
  difficulties: []
  seeds: [0]
  skip_completed: true

paths:
  trajectories_dir: trajectories
  results_dir: results
  workspace_dir: data/workspace
  logs_dir: logs
