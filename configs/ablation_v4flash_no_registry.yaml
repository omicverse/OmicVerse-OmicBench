run_name: ablation_v4flash_no_registry
description: |
  Mirror of ablation_gpt_no_registry but on DeepSeek-v4-flash.
  Cross-model ablation establishes the discovery-section ablation
  effect is not specific to gpt-5.5.

llm:
  model: deepseek-v4-flash
  endpoint: https://api.deepseek.com/v1
  api_key_env: DEEPSEEK_API_KEY
  temperature: 0.0

agent:
  max_agent_turns: 30

scope:
  systems: [deepseek_omicverse_no_registry]
  task_ids: []
  layers: [A, B, C, E, F, G, L]
  difficulties: []
  seeds: [0]
  skip_completed: true

paths:
  trajectories_dir: trajectories
  results_dir: results
  workspace_dir: data/workspace
  logs_dir: logs
